<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMI Calculator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>🏦 EMI Calculator</h1>

    <form method="POST">

        <label>Loan Amount</label><br>
        <input type="number" name="loan" required><br><br>

        <label>Annual Interest Rate (%)</label><br>
        <input type="number" step="0.01" name="rate" required><br><br>

        <label>Loan Tenure (Years)</label><br>
        <input type="number" name="years" required><br><br>

        <button type="submit">Calculate EMI</button>

    </form>

    {% if emi %}

    <hr>

    <h2>Result</h2>

    <p><b>Monthly EMI:</b> ₹ {{ emi }}</p>
    <p><b>Total Payment:</b> ₹ {{ total_payment }}</p>
    <p><b>Total Interest:</b> ₹ {{ total_interest }}</p>

    {% endif %}

</div>

</body>
</html>

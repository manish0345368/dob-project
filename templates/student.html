<!DOCTYPE html>
<html>
<head>
    <title>Student Percentage</title>
</head>
<body>

<h1>Student Percentage Calculator</h1>

<form method="POST">

<label>Student Name</label><br>
<input type="text" name="student" required><br><br>

<label>Marks Obtained</label><br>
<input type="number" name="marks" required><br><br>

<label>Total Marks</label><br>
<input type="number" name="total" required><br><br>

<button type="submit">Calculate</button>

</form>

{% if student %}

<hr>

<h2>Result</h2>

<p><b>Student:</b> {{ student }}</p>

<p><b>Marks:</b> {{ marks }}</p>

<p><b>Total:</b> {{ total }}</p>

<p><b>Percentage:</b> {{ percentage }}%</p>

{% endif %}

</body>
</html>
